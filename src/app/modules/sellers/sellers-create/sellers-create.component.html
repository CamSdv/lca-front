<div class="page-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Nuevo vendedor</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="dataForm">
                <div class="form-grid">
                    <mat-form-field appearance="outline">
                        <mat-label> Nombre</mat-label>
                        <input matInput formControlName="name" placeholder="Nombre">
                    </mat-form-field>

                </div>
            </form>
        </mat-card-content>
        <mat-card-actions>
            <button mat-raised-button (click)="back()">Cancelar</button>
            <button mat-raised-button color="primary" (click)="create()">Crear</button>
        </mat-card-actions>
    </mat-card>
</div>
