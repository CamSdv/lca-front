<div class="page-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Productos</mat-card-title>
            <button mat-raised-button color="primary" (click)="create()">
                <mat-icon>add</mat-icon>
                Agregar producto
            </button>
        </mat-card-header>

        <mat-card-content>
            <div class="table-container">
                <table mat-table [dataSource]="products">
            
                    <ng-container matColumnDef="Nombre">
                        <th mat-header-cell *matHeaderCellDef> Nombre </th>
                        <td mat-cell *matCellDef="let o"> {{o.name}} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Categoría">
                        <th mat-header-cell *matHeaderCellDef> Categoría </th>
                        <td mat-cell *matCellDef="let o"> {{o.category}} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Presentación">
                        <th mat-header-cell *matHeaderCellDef> Presentación </th>
                        <td mat-cell *matCellDef="let o"> {{o.presentation}} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Tipo">
                        <th mat-header-cell *matHeaderCellDef> Tipo </th>
                        <td mat-cell *matCellDef="let o"> {{o.pricingType | pricingType}} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Precio">
                        <th mat-header-cell *matHeaderCellDef> Precio </th>
                        <td mat-cell *matCellDef="let o"> {{o.price | currency}} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Estado">
                        <th mat-header-cell *matHeaderCellDef> Estado </th>
                        <td mat-cell *matCellDef="let o"> {{o.active | status}} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Fecha creación">
                        <th mat-header-cell *matHeaderCellDef> Fecha creación </th>
                        <td mat-cell *matCellDef="let o"> {{o.createdAt | date }} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Fecha modificación">
                        <th mat-header-cell *matHeaderCellDef> Fecha modificación </th>
                        <td mat-cell *matCellDef="let o"> {{o.updatedAt | date }} </td>
                    </ng-container>
            
                    <ng-container matColumnDef="Acciones">
                        <th mat-header-cell *matHeaderCellDef> Acciones </th>
                        <td mat-cell *matCellDef="let o">
            
                            <button mat-icon-button color="secundary" matTooltip="Editar" (click)="update(o.id)">
                                <mat-icon>edit</mat-icon>
                            </button>
                        </td>
                    </ng-container>
            
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            
                </table>
            </div>
        </mat-card-content>
    </mat-card>
</div>
