<div class="page-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Nuevo producto</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="dataForm">
                <div class="form-grid">
                    <mat-form-field appearance="outline">
                        <mat-label> Nombre</mat-label>
                        <input matInput formControlName="name" placeholder="CAMPESINO">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Categoría </mat-label>
                        <input matInput formControlName="category" placeholder="QUESO">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Presentación </mat-label>
                        <input matInput formControlName="presentation" placeholder="500G">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Precio </mat-label>
                        <input matInput type="number" formControlName="price" placeholder="35">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Tipo de precio </mat-label>
                        <mat-select formControlName="pricingType">
                            <mat-option value="UNIT"> UNIT </mat-option>
                            <mat-option value="WEIGHT"> WEIGHT </mat-option>
                        </mat-select>
                    </mat-form-field>

                </div>

                <div class="supplies-section">
                    <div class="supplies-header">
                        <h3>Suministros</h3>
                        <button mat-raised-button color="primary" type="button" (click)="addSupply()"> Agregar suministro
                        </button>
                    </div>

                    <!-- <div formArrayName="supplies" *ngFor="let supply of supplies.controls; let i = index">

                        <div [formGroupName]="i" class="supply-row">

                            <mat-form-field appearance="outline">
                                <mat-label> Supply ID </mat-label>
                                <input matInput type="number" formControlName="supplyId">
                            </mat-form-field>

                            <mat-form-field appearance="outline">
                                <mat-label> Cantidad requerida </mat-label>
                                <input matInput type="number" formControlName="quantityRequired">
                            </mat-form-field>

                            <button mat-icon-button color="warn" type="button" (click)="removeSupply(i)">
                                <mat-icon> delete </mat-icon>
                            </button>

                        </div>

                    </div> -->

                </div>
            </form>

        </mat-card-content>
        <mat-card-actions>
            <button mat-raised-button (click)="back()">Cancelar</button>
            <button mat-raised-button color="primary">Crear</button>
        </mat-card-actions>
    </mat-card>
</div>
