<div class="page-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title> Kardex </mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <table mat-table [dataSource]="movements" class="mat-elevation-z2">

                <ng-container matColumnDef="date">
                    <th mat-header-cell *matHeaderCellDef> Fecha </th>
                    <td mat-cell *matCellDef="let item"> {{ item.date | date:'short' }} </td>
                </ng-container>

                <ng-container matColumnDef="supply">
                    <th mat-header-cell *matHeaderCellDef> Insumo </th>
                    <td mat-cell *matCellDef="let item"> {{ item.supplyName }} </td>
                </ng-container>

                <ng-container matColumnDef="type">
                    <th mat-header-cell *matHeaderCellDef> Tipo </th>
                    <td mat-cell *matCellDef="let item">
                        <span class="badge" [class.in]="item.type === 'IN'" [class.out]="item.type === 'OUT'"> {{ item.type }}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="quantity">
                    <th mat-header-cell *matHeaderCellDef> Cantidad </th>
                    <td mat-cell *matCellDef="let item"> {{ item.quantity }} </td>
                </ng-container>

                <ng-container matColumnDef="balance">
                    <th mat-header-cell *matHeaderCellDef> Balance </th>
                    <td mat-cell *matCellDef="let item">
                        <strong> {{ item.balance }} </strong>
                    </td>
                </ng-container>

                <ng-container matColumnDef="reference">
                    <th mat-header-cell *matHeaderCellDef> Orden </th>
                    <td mat-cell *matCellDef="let item"> #{{ item.reference }} </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </mat-card-content>
    </mat-card>
</div>
