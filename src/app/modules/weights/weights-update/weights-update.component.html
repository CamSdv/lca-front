<table mat-table [dataSource]="items">

    <ng-container matColumnDef="product">
        <th mat-header-cell *matHeaderCellDef> Producto </th>
        <td mat-cell *matCellDef="let e"> {{e.product.name}} </td>
    </ng-container>

    <ng-container matColumnDef="weight">
        <th mat-header-cell *matHeaderCellDef> Peso (g) </th>
        <td mat-cell *matCellDef="let e">
            <input type="number" [(ngModel)]="e.finalWeight">
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['product','weight']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['product','weight'];"></tr>

</table>

<button mat-raised-button color="primary" (click)="update()">
    Guardar pesos
</button>
