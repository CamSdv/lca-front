<div class="page-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Nuevo suministro</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="dataForm">
                <div class="form-grid">
                    <mat-form-field appearance="outline">
                        <mat-label> Tipo</mat-label>
                        <mat-select formControlName="type" placeholder="Tipo">
                            <mat-option *ngFor="let type of typeList" [value]="type">
                                {{type}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Categoría</mat-label>
                        <mat-select formControlName="category" placeholder="Categoría">
                            <mat-option *ngFor="let category of categoryList" [value]="category.value">
                                {{category.name}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Presentación </mat-label>
                        <input matInput formControlName="presentation" placeholder="500G">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label> Existencias </mat-label>
                        <input matInput type="number" formControlName="stock" placeholder="100">
                    </mat-form-field>

                </div>
            </form>

        </mat-card-content>
        <mat-card-actions>
            <button mat-raised-button (click)="back()">Cancelar</button>
            <button mat-raised-button color="primary" (click)="create()">Crear</button>
        </mat-card-actions>
    </mat-card>
</div>
